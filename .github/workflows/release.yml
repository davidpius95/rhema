name: Multi-Platform Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Universal Binary — single .dmg works on both Apple Silicon AND Intel Macs
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          # Windows x64
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # ── Prepare all runtime resources BEFORE the Rust build ──────────────
      # These are bundled into the final installer via tauri.conf.json resources.
      - name: Download Bible source data
        run: bun run download:bible-data

      - name: Build Bible SQLite database
        run: bun run build:bible

      - name: Download Whisper model (~394 MB)
        run: bun run download:whisper

      - name: Download NDI SDK (optional, broadcast feature)
        run: bun run download:ndi-sdk
        continue-on-error: true

      - name: Setup Python (for ONNX model export)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download and export ONNX model (~2.4 GB FP32 + ~571 MB INT8)
        run: bun run download:model

      - name: Export verses for embedding
        run: bun run export:verses

      - name: Precompute verse embeddings
        run: bun run precompute:embeddings

      # Ensure all resource directories exist even if optional steps failed
      - name: Ensure resource directories exist
        shell: bash
        run: |
          mkdir -p models/qwen3-embedding-0.6b
          mkdir -p models/qwen3-embedding-0.6b-int8
          mkdir -p models/whisper
          mkdir -p embeddings
          mkdir -p sdk/ndi

      # ── Rust toolchain + targets ────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # macOS Universal Binary requires both arch targets
      - name: Add macOS Intel target (for Universal Binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: 'v3-rust'

      # On Windows: strip "staticlib" from crate-type so Cargo doesn't force
      # +crt-static, which conflicts with ort-sys pre-built /MD binaries.
      - name: Fix Windows CRT linkage
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $content = Get-Content src-tauri/Cargo.toml -Raw
          $content = $content -replace 'crate-type = \["staticlib", "cdylib", "rlib"\]', 'crate-type = ["cdylib", "rlib"]'
          Set-Content -Path src-tauri/Cargo.toml -Value $content
          Write-Host "Cargo.toml crate-type updated for Windows"

      # ── Build + Release ─────────────────────────────────────────────────
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: whisper.cpp/ggml requires std::filesystem → macOS 11.0+
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        with:
          tagName: v__VERSION__
          releaseName: 'Rhema v__VERSION__'
          releaseBody: |
            ## Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | **macOS** (Apple Silicon + Intel) | `.dmg` | Universal Binary — works on M1/M2/M3 and Intel Macs |
            | **Windows** (x64) | `.msi` | 64-bit installer for Windows 10/11 |

            > **First launch on macOS:** Right-click → Open (app is unsigned).
            > **Whisper model:** Bundled. Local speech-to-text works out of the box.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
