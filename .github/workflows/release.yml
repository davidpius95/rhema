name: Multi-Platform Release
on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    tags:
      - 'v*' # Trigger release automatically when a tag like v1.0.0 is pushed

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Prep NDI SDK and Bible Data
        run: |
          bun run download:ndi-sdk
          bun run download:bible-data
          bun run build:bible

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
            workspaces: './src-tauri -> target'

      - name: Set Windows Compiler Flags
        if: matrix.platform == 'windows-latest'
        run: |
          echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
          echo "CFLAGS=/MT" >> $GITHUB_ENV
          echo "CXXFLAGS=/MT" >> $GITHUB_ENV

      - name: Set macOS Deployment Target
        if: matrix.platform == 'macos-latest'
        run: echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Tauri action automatically grabs version from tauri.conf.json
          releaseName: 'Rhema v__VERSION__'
          releaseBody: 'Automated cross-platform build generated via GitHub Actions.'
          releaseDraft: true
          prerelease: false
