name: Multi-Platform Release
on:
  workflow_dispatch: # Allows manual trigger from GitHub UI
  push:
    tags:
      - 'v*' # Trigger release automatically when a tag like v1.0.0 is pushed

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Prep NDI SDK and Bible Data
        run: |
          bun run download:ndi-sdk
          bun run download:bible-data
          bun run build:bible

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # Cache key includes "v2" to bust stale caches from earlier builds
          # that had esaxx-rs compiled with /MT before the patch.
          prefix-key: 'v2-rust'

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: whisper.cpp/ggml uses std::filesystem which requires macOS 10.15+
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        with:
          tagName: v__VERSION__
          releaseName: 'Rhema v__VERSION__'
          releaseBody: 'Automated cross-platform build generated via GitHub Actions.'
          releaseDraft: true
          prerelease: false
